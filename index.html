<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Wildes Bayern - Anzeige Generator</title>
    <script type="module">
        import * as docx from "https://cdn.jsdelivr.net/npm/docx@8.5.0/+esm";
        window.docx = docx;
    </script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 30px auto; max-width: 900px; line-height: 1.6; background-color: #f4f7f6; }
        .section { background: white; margin-bottom: 20px; padding: 25px; border: 1px solid #ddd; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        h1 { color: #2c3e50; border-bottom: 2px solid #005f26; padding-bottom: 10px; }
        label { display: block; font-weight: bold; margin-top: 15px; color: #333; }
        input[type="text"], textarea { width: 100%; padding: 10px; margin-top: 5px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        button { background-color: #005f26; color: white; padding: 12px 20px; border: none; border-radius: 4px; cursor: pointer; margin-top: 15px; font-weight: bold; width: 100%; }
        #map { width: 100%; height: 350px; margin-top: 15px; }
        .coord-list { background: #e8f5e9; padding: 15px; margin-top: 15px; border-left: 4px solid #28a745; }
        .flex-row { display: flex; gap: 15px; }
        .flex-row > div { flex: 1; }
    </style>
</head>
<body>

    <h1>Wildes Bayern e.V. - Anzeige Generator</h1>

    <div class="section">
        <h3>1. Fundorte erfassen</h3>
        <input type="text" id="coordInput" placeholder="Breitengrad, Längengrad (z.B. 48.54, 11.73)">
        <button onclick="processCoordinates()">Koordinate hinzufügen & BayernAtlas abfragen</button>
        <div id="coordDisplay" class="coord-list">Noch keine Koordinaten erfasst.</div>
        <div id="map"></div>
    </div>

    <div class="section">
        <h3>2. Details</h3>
        <label>PLZ & Ort:</label>
        <input type="text" id="plzOrt">
        <label>Flurnummer(n):</label>
        <input type="text" id="flurnummer">
        
        <div class="flex-row">
            <div>
                <label>Name des Schutzgebietes:</label>
                <input type="text" id="sgName">
            </div>
            <div>
                <label>ID-Code Bayern:</label>
                <input type="text" id="sgId">
            </div>
        </div>

        <label>Fotos:</label>
        <input type="file" id="photoUpload" accept="image/png, image/jpeg" multiple>
    </div>

    <div class="section">
        <button onclick="generateDocument()" style="background-color: #28a745; font-size: 1.2em;">Anzeige als .docx herunterladen</button>
    </div>

    <script>
        let map = L.map('map').setView([48.7904, 11.4979], 7);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' }).addTo(map);

        let coordinatesList = [];
        let photoDataArray = [];

        async function fetchLfuSchutzgebiet(lat, lng) {
            const layers = ['natur:ffh_gebiete', 'natur:vogelschutzgebiete', 'natur:naturschutzgebiete', 'natur:landschaftsschutzgebiete'];
            const d = 0.045;
            const bbox = `${lng - d},${lat - d},${lng + d},${lat + d}`;
            const workerUrl = "https://wildes-bayern-proxy.wildesbayern1.workers.dev/?url=";

            for (const layer of layers) {
                const targetUrl = `https://www.lfu.bayern.de/gdi/wfs/natur/schutzgebiete?SERVICE=WFS&VERSION=1.0.0&REQUEST=GetFeature&typeName=${layer}&BBOX=${bbox}`;
                try {
                    const response = await fetch(workerUrl + encodeURIComponent(targetUrl));
                    const text = await response.text();
                    if (text.includes('gml:featureMember')) {
                        const nameMatch = text.match(/<[^>]*name[^>]*>([^<]+)<\//i) || text.match(/<[^>]*bezeichnung[^>]*>([^<]+)<\//i);
                        const idMatch = text.match(/<[^>]*id_code[^>]*>([^<]+)<\//i) || text.match(/<[^>]*nummer[^>]*>([^<]+)<\//i);
                        if (nameMatch) return { name: nameMatch[1].trim(), id: idMatch ? idMatch[1].trim() : "" };
                    }
                } catch (e) { console.error(e); }
            }
            return null;
        }

        async function processCoordinates() {
            const input = document.getElementById('coordInput').value;
            const [lat, lng] = input.split(',').map(c => parseFloat(c.trim()));
            coordinatesList.push(`${lat}, ${lng}`);
            L.marker([lat, lng]).addTo(map);
            map.setView([lat, lng], 12);
            document.getElementById('coordDisplay').innerHTML = coordinatesList.map(c => `<div>📍 ${c}</div>`).join('');
            
            const sgData = await fetchLfuSchutzgebiet(lat, lng);
            if (sgData) {
                document.getElementById('sgName').value = sgData.name;
                document.getElementById('sgId').value = sgData.id;
            }
        }

        document.getElementById('photoUpload').addEventListener('change', function(event) {
            Array.from(event.target.files).forEach(file => {
                const reader = new FileReader();
                reader.onload = e => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const scale = Math.min(600 / img.width, 1);
                        canvas.width = img.width * scale; canvas.height = img.height * scale;
                        canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                        photoDataArray.push({ data: canvas.toDataURL('image/jpeg', 0.7).split(',')[1], width: canvas.width, height: canvas.height });
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        });

        async function generateDocument() {
            if (!window.docx) { alert("Bibliothek wird noch geladen..."); return; }
            const { Document, Packer, Paragraph, ImageRun, AlignmentType, HeadingLevel } = window.docx;
            
            const sgName = document.getElementById('sgName').value;
            const sgId = document.getElementById('sgId').value;
            
            const docChildren = [
                new Paragraph({ text: "Wildes Bayern e.V.", bold: true }),
                new Paragraph({ text: "\nAnzeige wegen Zaunmaterial in " + document.getElementById('plzOrt').value, heading: HeadingLevel.HEADING_2 }),
                new Paragraph({ text: `Koordinaten: ${coordinatesList.join('; ')}` }),
                new Paragraph({ text: `Flurnummer: ${document.getElementById('flurnummer').value}` }),
                ...(sgName ? [new Paragraph({ text: `\nDas Gebiet liegt in der Nähe von: ${sgName} (Gebietsnr: ${sgId})`, bold: true })] : []),
                new Paragraph({ text: "\nSachverhalt: Das Zaunmaterial ist als Abfall zu betrachten.", bold: true }),
                ...(photoDataArray.length > 0 ? [new Paragraph({ text: "\nAnlage: Fotos", heading: HeadingLevel.HEADING_2 })] : [])
            ];
            
            photoDataArray.forEach(img => {
                docChildren.push(new Paragraph({
                    children: [new ImageRun({ data: Uint8Array.from(atob(img.data), c => c.charCodeAt(0)), transformation: { width: img.width, height: img.height } })],
                    alignment: AlignmentType.CENTER
                }));
            });

            const doc = new Document({ sections: [{ children: docChildren }] });
            const blob = await Packer.toBlob(doc);
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = "Anzeige.docx"; a.click();
        }
    </script>
</body>
</html>
